name: Deploy Editor to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src-renderer-webpack/**'
      - 'font/**'
      - 'webpack.web.cjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        # 使用 --ignore-scripts 跳过 scratch-gui 的 prepublish（下载 microbit 固件经常超时）
        run: npm ci --ignore-scripts

      - name: Run scratch-gui prepublish
        # scratch-gui 的 prepublish 下载 microbit 固件并生成必要文件，加重试
        run: |
          for i in 1 2 3; do
            cd $GITHUB_WORKSPACE/node_modules/scratch-gui && node scripts/prepublish.mjs && exit 0
            echo "scratch-gui prepublish attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "scratch-gui prepublish failed after 3 attempts"
          exit 1

      - name: Prepare extensions
        run: node scripts/prepare-extensions.mjs

      - name: Build web editor
        run: npm run web:build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
