name: Build (Auto)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
    - name: Install dependencies
      # 使用 --ignore-scripts 跳过 scratch-gui 的 prepublish（下载 microbit 固件经常超时）
      run: npm ci --ignore-scripts
    - name: Install Electron binary
      run: cd node_modules/electron && node install.js
    - name: Run scratch-gui prepublish
      # scratch-gui 的 prepublish 下载 microbit 固件并生成必要文件，加重试
      run: |
        for i in 1 2 3; do
          cd $GITHUB_WORKSPACE/node_modules/scratch-gui && node scripts/prepublish.mjs && exit 0
          echo "scratch-gui prepublish attempt $i failed, retrying in 10s..."
          sleep 10
        done
        echo "scratch-gui prepublish failed after 3 attempts"
        exit 1
    - name: Prepare extensions
      # Don't need to do a full fetch, that would just cause a lot of unnecessary traffic
      run: node scripts/prepare-extensions.mjs
    - name: Compile
      run: npm run webpack:compile
    - name: Package
      run: npm run electron:package:dir
