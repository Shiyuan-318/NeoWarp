<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        --bg: #f5f5f7;
        --card-bg: #ffffff;
        --text: #1d1d1f;
        --text-secondary: #6e6e73;
        --border: #e5e5ea;
        --accent: #3b82f6;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
        --radius: 12px;
      }
      [data-theme="dark"] {
        --bg: #1c1c1e;
        --card-bg: #2c2c2e;
        --text: #f5f5f7;
        --text-secondary: #a1a1a6;
        --border: #3a3a3c;
        --accent: #60a5fa;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
        line-height: 1.7;
      }
      main {
        padding: 32px 28px;
        max-width: 600px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.3px;
        margin-bottom: 24px;
        text-align: center;
      }
      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 12px;
        box-shadow: var(--shadow-sm);
      }
      .card:last-child {
        margin-bottom: 0;
      }
      h2 {
        font-size: 15px;
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 8px;
      }
      p {
        color: var(--text-secondary);
        margin-bottom: 6px;
      }
      p:last-child {
        margin-bottom: 0;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .value {
        font-weight: 600;
        color: var(--text);
        user-select: text;
      }
    </style>
  </head>
  <body>
    <script>
      (async () => {
        const theme = await ContactPreload.getTheme();
        document.documentElement.setAttribute('data-theme', theme);
      })();
      ContactPreload.onThemeChanged((data) => {
        document.documentElement.setAttribute('data-theme', data.theme || 'light');
      });
    </script>
    <main>
      <h1>联系我们</h1>

      <div class="card">
        <h2>QQ 群</h2>
        <p>群号：<span class="value">517453896</span></p>
      </div>

      <div class="card">
        <h2>官方网站</h2>
        <p><a href="http://np.sy1.top" target="_blank" rel="noreferrer">np.sy1.top</a></p>
      </div>
    </main>
  </body>
</html>
