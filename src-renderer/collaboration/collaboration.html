<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>协作</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-secondary: #f0f0f2;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --border: #e5e5e8;
      --accent: #007AFF;
      --accent-hover: #0066d6;
      --accent-light: #e8f0fe;
      --danger: #ff3b30;
      --danger-light: #ffeceb;
      --success: #34c759;
      --bubble-other: #ffffff;
      --bubble-self: #007AFF;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-full: 50px;
      --transition: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    .view {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      overflow-y: auto;
    }
    .view::-webkit-scrollbar { width: 6px; }
    .view::-webkit-scrollbar-track { background: transparent; }
    .view::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 3px; }
    .view-header { margin-bottom: 24px; }
    .view-icon {
      width: 48px; height: 48px; border-radius: var(--radius);
      background: var(--accent-light); color: var(--accent);
      display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
    }
    .view-icon svg { width: 26px; height: 26px; }
    .view-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .view-subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.4; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 0.2px;
    }
    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group input[type="number"] {
      width: 100%; height: 44px; border: 1.5px solid var(--border);
      border-radius: var(--radius); background: var(--surface);
      color: var(--text); font-size: 15px; padding: 0 14px;
      outline: none; transition: all var(--transition); font-family: inherit;
      -webkit-appearance: none;
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .form-group input::placeholder { color: var(--text-tertiary); }
    .checkbox-group {
      display: flex; flex-direction: column; gap: 0;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 0 14px;
    }
    .checkbox-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: var(--text); padding: 10px 0;
      cursor: pointer; border-bottom: 1px solid var(--border);
    }
    .checkbox-item:last-child { border-bottom: none; }
    .checkbox-item input[type="checkbox"] {
      width: 20px; height: 20px; border-radius: 6px;
      accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
    }
    .checkbox-item span { font-weight: 400; }
    .btn-primary {
      width: 100%; height: 48px; border: none; border-radius: var(--radius-full);
      background: var(--accent); color: #ffffff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all var(--transition); outline: none;
      font-family: inherit; margin-top: 8px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger {
      height: 34px; padding: 0 18px; border: none; border-radius: var(--radius-full);
      background: var(--danger-light); color: var(--danger); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all var(--transition); outline: none;
      font-family: inherit; flex-shrink: 0;
    }
    .btn-danger:hover { background: var(--danger); color: #ffffff; }
    .btn-danger:active { transform: scale(0.96); }
    .error-msg {
      color: var(--danger); font-size: 13px; margin-top: 12px;
      text-align: center; min-height: 18px; line-height: 1.4;
    }
    #collab-active-view { padding: 0; display: none; flex-direction: column; }
    #collab-active-view.active { display: flex; }
    .collab-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; padding-top: max(14px, env(safe-area-inset-top));
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; -webkit-app-region: drag; z-index: 10;
    }
    .collab-header-info { display: flex; flex-direction: column; gap: 2px; -webkit-app-region: no-drag; }
    .role-label { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
    .online-count { font-size: 12px; color: var(--text-secondary); }
    #btn-end-collab { -webkit-app-region: no-drag; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px 14px;
      scroll-behavior: smooth; display: flex; flex-direction: column; gap: 10px;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 3px; }
    .message-row {
      display: flex; flex-direction: column; max-width: 75%;
      animation: bubble-in 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-row.message-self { align-self: flex-end; align-items: flex-end; }
    .message-row.message-other { align-self: flex-start; align-items: flex-start; }
    .message-sender {
      font-size: 11px; color: var(--text-secondary);
      margin: 0 12px 3px 12px; font-weight: 500;
    }
    .message-bubble {
      padding: 10px 14px; font-size: 14px; line-height: 1.4;
      word-break: break-word; position: relative;
    }
    .message-other .message-bubble {
      background: var(--bubble-other); color: var(--text);
      border-radius: 18px 18px 18px 4px; box-shadow: var(--shadow);
    }
    .message-self .message-bubble {
      background: var(--bubble-self); color: #ffffff;
      border-radius: 18px 18px 4px 18px; box-shadow: var(--shadow);
    }
    .message-timestamp { font-size: 10px; color: var(--text-tertiary); margin: 3px 12px 0 12px; }
    .message-self .message-timestamp { color: var(--text-tertiary); }
    .message-system {
      align-self: center; max-width: 90%;
      background: var(--surface-secondary); color: var(--text-secondary);
      font-size: 12px; padding: 6px 14px; border-radius: var(--radius-full);
      text-align: center; line-height: 1.4;
    }
    .chat-input-area {
      display: flex; gap: 8px; padding: 12px 14px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
    }
    #chat-input {
      flex: 1; height: 38px; border: 1.5px solid var(--border);
      border-radius: var(--radius-full); background: var(--surface-secondary);
      color: var(--text); font-size: 14px; padding: 0 16px;
      outline: none; transition: all var(--transition); font-family: inherit;
      -webkit-appearance: none;
    }
    #chat-input:focus {
      border-color: var(--accent); background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    #chat-input::placeholder { color: var(--text-tertiary); }
    .btn-send {
      height: 38px; padding: 0 18px; border: none; border-radius: var(--radius-full);
      background: var(--accent); color: #ffffff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all var(--transition); outline: none;
      font-family: inherit; flex-shrink: 0;
    }
    .btn-send:hover { background: var(--accent-hover); }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <!-- Host setup view -->
  <div id="host-setup-view" class="view">
    <div class="view-header">
      <div class="view-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </div>
      <h2>发起协作</h2>
      <p class="view-subtitle">创建一个协作房间，邀请其他人加入</p>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="host-password" placeholder="设置协作密码">
    </div>
    <div class="form-group">
      <label>端口号</label>
      <input type="number" id="host-port" value="8080" min="1" max="65535">
    </div>
    <div class="form-group">
      <label>协作者权限</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" id="perm-add-extension" checked> <span>允许添加扩展</span></label>
        <label class="checkbox-item"><input type="checkbox" id="perm-delete-extension" checked> <span>允许删除扩展</span></label>
        <label class="checkbox-item"><input type="checkbox" id="perm-delete-sprite" checked> <span>允许删除角色</span></label>
      </div>
    </div>
    <button id="btn-start-host" class="btn-primary">发起协作</button>
    <div id="host-error" class="error-msg"></div>
  </div>

  <!-- Join setup view -->
  <div id="join-setup-view" class="view" style="display:none">
    <div class="view-header">
      <div class="view-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 6.5l-4 4-2-2-4 4 1.5 1.5L9 10l2 2 4-4 2 2 4-4-1.5-1.5L17 4.5z"></path>
          <path d="M3 12v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        </svg>
      </div>
      <h2>加入协作</h2>
      <p class="view-subtitle">输入主机信息，加入协作房间</p>
    </div>
    <div class="form-group">
      <label>IP 地址</label>
      <input type="text" id="join-ip" placeholder="例如 192.168.1.100">
    </div>
    <div class="form-group">
      <label>端口</label>
      <input type="number" id="join-port" value="8080" min="1" max="65535">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="join-password" placeholder="输入协作密码">
    </div>
    <button id="btn-join" class="btn-primary">加入协作</button>
    <div id="join-error" class="error-msg"></div>
  </div>

  <!-- Collaboration active view (chat + management) -->
  <div id="collab-active-view" class="view" style="display:none">
    <div class="collab-header">
      <div class="collab-header-info">
        <span id="collab-role-label" class="role-label"></span>
        <span id="collab-online-count" class="online-count"></span>
      </div>
      <button id="btn-end-collab" class="btn-danger"></button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="输入消息...">
      <button id="btn-send" class="btn-send">发送</button>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      var Preload = window.CollaborationPreload;

      var hostSetupView = document.getElementById('host-setup-view');
      var joinSetupView = document.getElementById('join-setup-view');
      var collabActiveView = document.getElementById('collab-active-view');
      var hostPassword = document.getElementById('host-password');
      var hostPort = document.getElementById('host-port');
      var permAddExtension = document.getElementById('perm-add-extension');
      var permDeleteExtension = document.getElementById('perm-delete-extension');
      var permDeleteSprite = document.getElementById('perm-delete-sprite');
      var btnStartHost = document.getElementById('btn-start-host');
      var hostError = document.getElementById('host-error');
      var joinIp = document.getElementById('join-ip');
      var joinPort = document.getElementById('join-port');
      var joinPassword = document.getElementById('join-password');
      var btnJoin = document.getElementById('btn-join');
      var joinError = document.getElementById('join-error');
      var collabRoleLabel = document.getElementById('collab-role-label');
      var collabOnlineCount = document.getElementById('collab-online-count');
      var btnEndCollab = document.getElementById('btn-end-collab');
      var chatMessages = document.getElementById('chat-messages');
      var chatInput = document.getElementById('chat-input');
      var btnSend = document.getElementById('btn-send');

      var currentMode = null;
      var onlineCount = 1;

      function showView(view) {
        hostSetupView.style.display = 'none';
        joinSetupView.style.display = 'none';
        collabActiveView.classList.remove('active');
        collabActiveView.style.display = 'none';
        if (view === 'host') {
          hostSetupView.style.display = 'flex';
        } else if (view === 'join') {
          joinSetupView.style.display = 'flex';
        } else if (view === 'active') {
          collabActiveView.style.display = 'flex';
          collabActiveView.classList.add('active');
        }
      }

      function showError(element, msg) { element.textContent = msg; }

      function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
      }

      function formatTimestamp(ts) {
        var d = new Date(ts);
        var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
        return pad(d.getHours()) + ':' + pad(d.getMinutes());
      }

      function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

      function renderMessage(data) {
        if (data.isSystem || data.type === 'system') {
          var sysEl = document.createElement('div');
          sysEl.className = 'message-system';
          sysEl.textContent = data.text;
          chatMessages.appendChild(sysEl);
          scrollToBottom();
          return;
        }
        var row = document.createElement('div');
        row.className = 'message-row ' + (data.isSelf ? 'message-self' : 'message-other');
        if (!data.isSelf && data.from) {
          var sender = document.createElement('div');
          sender.className = 'message-sender';
          sender.textContent = data.from;
          row.appendChild(sender);
        }
        var bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = data.text;
        row.appendChild(bubble);
        if (data.timestamp) {
          var time = document.createElement('div');
          time.className = 'message-timestamp';
          time.textContent = formatTimestamp(data.timestamp);
          row.appendChild(time);
        }
        chatMessages.appendChild(row);
        scrollToBottom();
      }

      function updateOnlineCount(count) {
        onlineCount = count;
        collabOnlineCount.textContent = count + ' 人在线';
      }

      function sendChat() {
        var text = chatInput.value.trim();
        if (!text) return;
        Preload.sendMessage(text);
        chatInput.value = '';
        chatInput.focus();
      }

      btnStartHost.addEventListener('click', function() {
        var password = hostPassword.value.trim();
        var port = parseInt(hostPort.value, 10);
        var permissions = {
          allowAddExtension: permAddExtension.checked,
          allowDeleteExtension: permDeleteExtension.checked,
          allowDeleteSprite: permDeleteSprite.checked
        };
        if (!password) { showError(hostError, '请设置密码'); return; }
        if (!port || port < 1 || port > 65535) { showError(hostError, '请输入有效端口号 (1-65535)'); return; }
        showError(hostError, '');
        btnStartHost.disabled = true;
        btnStartHost.textContent = '正在启动...';
        Preload.startHost(password, port, permissions);
      });

      btnJoin.addEventListener('click', function() {
        var ip = joinIp.value.trim();
        var port = parseInt(joinPort.value, 10);
        var password = joinPassword.value.trim();
        if (!ip) { showError(joinError, '请输入 IP 地址'); return; }
        if (!port || port < 1 || port > 65535) { showError(joinError, '请输入有效端口号 (1-65535)'); return; }
        if (!password) { showError(joinError, '请输入密码'); return; }
        showError(joinError, '');
        btnJoin.disabled = true;
        btnJoin.textContent = '正在连接...';
        Preload.joinConnect(ip, port, password);
      });

      btnSend.addEventListener('click', sendChat);
      chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); sendChat(); }
      });

      btnEndCollab.addEventListener('click', function() {
        if (currentMode === 'host') {
          btnEndCollab.disabled = true;
          Preload.endHost().then(function() { Preload.closeWindow(); });
        } else if (currentMode === 'join') {
          Preload.leave().then(function() { Preload.closeWindow(); });
        }
      });

      Preload.onHostStarted(function(data) {
        btnStartHost.disabled = false;
        btnStartHost.textContent = '发起协作';
        if (data.success) {
          currentMode = 'host';
          collabRoleLabel.textContent = '管理员';
          btnEndCollab.textContent = '结束协作';
          updateOnlineCount(data.onlineCount || 1);
          showView('active');
          renderMessage({ isSystem: true, text: '协作已启动，等待其他人加入...' });
          setTimeout(function() { chatInput.focus(); }, 100);
        } else {
          showError(hostError, data.error || '启动失败');
        }
      });

      Preload.onJoinConnected(function(data) {
        btnJoin.disabled = false;
        btnJoin.textContent = '加入协作';
        if (data.success) {
          currentMode = 'join';
          collabRoleLabel.textContent = '参与者';
          btnEndCollab.textContent = '退出协作';
          updateOnlineCount(1);
          showView('active');
          renderMessage({ isSystem: true, text: '已加入协作房间' });
          setTimeout(function() { chatInput.focus(); }, 100);
        } else {
          showError(joinError, data.error || '连接失败');
        }
      });

      Preload.onChatMessage(function(data) { renderMessage(data); });

      Preload.onClientJoin(function(data) {
        renderMessage({ isSystem: true, text: data.username + ' 加入了协作' });
        if (data.onlineCount !== undefined) { updateOnlineCount(data.onlineCount); }
      });

      Preload.onClientLeave(function(data) {
        renderMessage({ isSystem: true, text: data.username + ' 离开了协作' });
        if (data.onlineCount !== undefined) { updateOnlineCount(data.onlineCount); }
        else { updateOnlineCount(Math.max(1, onlineCount - 1)); }
      });

      Preload.onCollaborationEnded(function(data) {
        var reason = data.reason === 'host-ended' ? '主机已结束协作' : '协作已结束';
        renderMessage({ isSystem: true, text: reason });
        setTimeout(function() {
          alert(reason);
          btnStartHost.disabled = false;
          btnStartHost.textContent = '发起协作';
          btnJoin.disabled = false;
          btnJoin.textContent = '加入协作';
          showError(hostError, '');
          showError(joinError, '');
          if (currentMode === 'host') { showView('host'); }
          else { showView('join'); }
          currentMode = null;
        }, 500);
      });

      if (Preload.onFocusChat) {
        Preload.onFocusChat(function() {
          if (collabActiveView.classList.contains('active')) { chatInput.focus(); }
        });
      }

      if (Preload.onEndRequested) {
        Preload.onEndRequested(function() {
          if (currentMode === 'host') {
            btnEndCollab.disabled = true;
            Preload.endHost().then(function() { Preload.closeWindow(); });
          }
        });
      }

      if (Preload.onLeaveRequested) {
        Preload.onLeaveRequested(function() {
          if (currentMode === 'join') {
            Preload.leave().then(function() { Preload.closeWindow(); });
          }
        });
      }

      Preload.getMode().then(function(mode) {
        currentMode = mode;
        if (mode === 'host') { showView('host'); }
        else { showView('join'); }
      });
    })();
  </script>
</body>
</html>
