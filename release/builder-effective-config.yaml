directories:
  output: release
  buildResources: build
appId: org.neowarp.desktop
productName: NeoWarp
files:
  - filter:
      - node_modules/**/*
      - src-main/**/*
      - src-preload/**/*
      - src-renderer/**/*
      - dist-renderer-webpack/**/*
      - dist-library-files/**/*
      - dist-extensions/**/*
extraResources:
  - from: art/icon.png
    to: icon.png
  - from: art/icon.svg
    to: icon.svg
win:
  artifactName: ${productName} Portable ${version} ${arch}.${ext}
  icon: build/icon.ico
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64
appx:
  artifactName: ${productName}-MS-Store-${version}-${arch}.${ext}
  applicationId: NeoWarp
  displayName: NeoWarp
  identityName: Shiyuan.NeoWarpDesktop
  publisher: CN=Shiyuan
  publisherDisplayName: Shiyuan
  backgroundColor: '#4c97ff'
  showNameOnTiles: true
  languages:
    - en-US
    - nl
    - de
    - it
    - ko
nsis:
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  oneClick: false
  deleteAppDataOnUninstall: false
  allowToChangeInstallationDirectory: true
mac:
  artifactName: ${productName}-Setup-${version}.${ext}
  icon: build/icon.icns
  category: public.app-category.education
  darkModeSupport: true
  gatekeeperAssess: false
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    ITSAppUsesNonExemptEncryption: false
    LSMultipleInstancesProhibited: true
    NSCameraUsageDescription: This app requires camera access when using the video sensing or face sensing blocks.
    NSMicrophoneUsageDescription: This app requires microphone access when recording sounds or detecting loudness.
  target:
    - arch: universal
      target: dmg
mas:
  hardenedRuntime: false
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  provisioningProfile: build/distribution.provisionprofile
masDev:
  type: development
  provisioningProfile: build/development.provisionprofile
linux:
  executableName: neowarp
  artifactName: ${productName}-${os}-${arch}-${version}.${ext}
  icon: ./build/
  synopsis: NeoWarp - Scratch mod with a compiler and more features.
  description: NeoWarp is a Scratch mod with a compiler to run projects faster, dark mode for your eyes, a bunch of addons to improve the editor, and more.
  category: Development
  desktop:
    entry:
      StartupWMClass: neowarp
      Keywords: scratch;neowarp;
  extraFiles:
    - linux-files
  target:
    - target: deb
    - target: appimage
    - target: tar.gz
snap:
  summary: NeoWarp - Scratch mod with a compiler, dark mode, a bunch of addons, and more.
  allowNativeWayland: true
  plugs:
    - default
    - camera
    - audio-record
    - joystick
    - removable-media
appImage:
  license: null
fileAssociations:
  - ext: sb3
    name: Scratch 3 Project
    description: Scratch 3 Project
    role: Editor
    mimeType: application/x.scratch.sb3
  - ext: sb2
    name: Scratch 2 Project
    description: Scratch 2 Project
    role: Editor
    mimeType: application/x.scratch.sb2
  - ext: sb
    name: Scratch 1 Project
    description: Scratch 1 Project
    role: Editor
    mimeType: application/x.scratch.sb
electronVersion: 41.1.0
